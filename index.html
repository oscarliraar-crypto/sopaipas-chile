lor:var(--trofeo);border-color:#fbbf2444;background:#fbbf2411}.píldora-azul{color:#60a5fa;border-color:#60a5fa44;background:#60a5fa11}.píldora-verde{color:var(--verde);border-color:#22c55e44;background:#22c55e11}.píldora-gris{color:var(--plata);border-color:#ffffff22;background:#ffffff0a}.píldora-roja{color:#f87171;border-color:# ef444444;background:#ef444411}.player-extras{margin-top:5px;font-size:12px;color:var(--silver)}.player-notes{margin-top:3px;font-size:12px;color:#7a8fb5;font-style:italic}.edit-btn{background:transparent;border:none;cursor:pointer;color:var(--gold);font-size:18px;padding:4px;opacity:0;pointer-events:none;flex-shrink:0;transition:opacity .2s}.edit-btn.show{opacity:1;pointer-events:all}.war-banner{background:linear-gradient(135deg,#1a3a8f,#7c3aed33);border:2px<div class="header"><div class="header-title">⚔️ sopaipas_chile<span>CLASH ROYALE · CHILE</span></div><div id="adminBadge" class="admin-badge">👑 ADMIN</div><button class="secret-btn" id="secretBtn">🛡️</button></div><div id="pageRoster" class="page active"><div class="section-header"><div class="section-title">📋 Nómina del Clan</div><button class="refresh-btn" onclick="loadRoster()">↻ Actualizar</button></div><div class="search-wrap"><span class="search-icon">🔍</span><input class="search-input" id="searchInput" placeholder="Buscar jugador..." oninput="filterRoster()"/></div><div id="rosterContent"><div class="loading"><div class="spinner"></div>Cargando nómina...</div></div></div><div id="pageWar" class="page"><div id="warContent"><div class="loading"><div class="spinner"></div>Cargando guerra...</div></div></div><div id="pageRankings" class="page"><div class="tabs"><button class="tab active" id="tabWeekly" onclick="showRanking('weekly',this)">📅 Semanal</button><button class="tab" onclick="showRanking('monthly',this)">📆 Mensual</button><button class="tab" onclick="showRanking('annual',this)">🏆 Anual</button></div><div id="rankingContent"><div class="loading"><div class="spinner"></div>Cargando rankings...</div></div></div><div id="pageStats" class="page"><div id="statsContent"><div class="loading"><div class="spinner"></div>Cargando estadísticas...</div></div></div><nav class="nav"><button class="nav-btn active" onclick="navigate('Roster',this)"><span class="icon">⚔️</span>Nombre</button><button class="nav-btn" onclick="navigate('War',this)"><span class="icon">🚣</span>Guerra</button><button class="nav-btn" onclick="navigate('Rankings',this)"><span class="icon">🏆</span>Clasificaciones</button><button class="nav-btn" onclick="navigate('Stats',this)"><span class="icon">📊</span>Estadísticas</button></nav><div class="modal-overlay hidden" id="adminModal"><div class="modal"><div class="modal-title">👑 Acceso Administrador</div><div id="loginError" class="modal-error" style="display:none"></div><input class="modal-input" id="adminPwd" type="password" placeholder="Contraseña del líder" onkeydown="if(event.key==='Enter')doLogin()"/><button class="modal-btn" onclick="doLogin()">ENTRAR AL CLAN</button><button class="modal-btn-cancel" onclick="closeModal('adminModal')">Cancelar</button></div></div><div class="modal-overlay hidden" id="editModal"><div class="modal"><div class="modal-title" id="editModalTitle">✏️ Editar Jugador</div><input class="modal-input" id="editPhone" type="tel" placeholder="📱 Teléfono de contacto"/><input class="modal-input" id="editJoinDate" type="text" placeholder="📅 Fecha de ingreso al plan (ej: 01/01/2024)"/><input class="modal-input" id="editNotes" type="text" placeholder="📝 Notas del líder"/><button class="modal-btn" onclick="saveExtras()">GUARDAR</button><button class="modal-btn-cancel" onclick="closeModal('editModal')">Cancelar</button></div></div><script>const CLAN_TAG='#G09GCYPJ';const API_TOKEN='eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzUxMiIsImtpZCI6IjI4YTMxOGY3LTAwMDAtYTFlYi03ZmExLTJjNzQzM2M2Y2NhNSJ9.eyJpc3MiOiJzdXBlcmNlbGwiLCJhdWQiOiJzdXBlcmNlbGw6Z2FtZWFwaSIsImp0aSI6ImUxMDNkNDc1LWU1YWYtNDIxMy04NWYzLTI3NGRlNWNiNGNlZCIsImlhdCI6MTc3Mzk1Mzc3OCwic3ViIjoiZGV2ZWxvcGVyL2ZhYTg5ODY3LTMzNGY tNzU5MC0wMTkwLTUwNTY0NTgzNTMzMCIsInNjb3BlcyI6WyJyb3lhbGUiXSwibGltaXRzIjpbeyJ0aWVyIjoiZGV2ZWxvcGVyL3NpbHZlciIsInR5cGUiOiJ0aHJvdHRsaW5nIn0seyJjaWRycyI6WyIxODEuNDMuMjA5Ljc0Il0sInR5cGUiOiJjbGllbnQifV19.KIEbleJJqIWBKa9rdV4ES5rvG6qh8mwgLBFcAwjitT_sZ2ZYVoCcTppmACryyBcX9oHy0QWs7jTBKEAiyRjCBw';const ADMIN_PASS='sopaipas2024';const PROXY='https://api.allorigins.win/raw?url=';let isAdmin=false,rosterData=[],currentRace=null,editingTag='';let tapCount=0,lastTap=0;let ​​extras=JSON.parse(localStorage.getItem('cr_extras')||'{}');let snapshots=JSON.parse(localStorage.getItem('cr_snapshots')||'[]');async function apiCall(path){const tag=CLAN_TAG.replace('#','%23');const url='https://api.clashroyale.com/v1'+path.replace('{tag}',tag);const res=await fetch(PROXY+encodeURIComponent(url),{headers:{'Authorization':'Bearer '+API_TOKEN}});if(!res.ok)throw new Error('HTTP '+res.status);return res.json()}function navigate(page,btn){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));document.getElementById('page'+page).classList.add('active');btn.classList.add('active');if(page==='War')loadWar();if(page==='Rankings'){showRanking('weekly',document.getElementById('tabWeekly'));}if(page==='Stats')loadStats()}function roleLabel(r){return{leader:'👑 Líder',coLeader:'⭐ CoLíder',elder:'🔱 Anciano',member:'⚔️ Miembro'}[r]||'⚔️ Miembro'}async function loadRoster(){document.getElementById('rosterContent').innerHTML='<div class="loading"><div class="spinner"></div>Cargando nómina...</div>';try{const d=await apiCall('/clans/{tag}/members');rosterData=d.items.sort((a,b)=>a.clanRank-b.clanRank);renderRoster(rosterData)}catch(e){document.getElementById('rosterContent').innerHTML='<div class="error-box">⚠️ No se pudo cargar la nómina.<br>Verifica tu conexión.<br><small>'+e.message+'</small></div>'}}function renderRoster(players){if(!players.length){document.getElementById('rosterContent').innerHTML='<div style="text-align:center;padding:40px;color:var(--silver)">Sin resultados</div>';return}document.getElementById('rosterContent').innerHTML=players.map(p=>{const ex=extras[p.tag]||{};return'<div class="card"><div class="player-card">'+'<div class="rank-badge">'+p.clanRank+'</div>'+'<div class="player-info">'+'<div class="player-name"><span>'+p.name+'</span><span class="player-role">'+roleLabel(p.role)+'</span></div>'+'<div class="player-stats">'+'<span class="pill pill-gold">🏆 '+p.trophies+'</span>'+'<span class="pill pill-blue">👑 Nv.'+p.expLevel+'</span>'+'<span class="pill pill-green">🎁 '+p.donations+'</span>'+'<span class="pill pill-gray">⚔️ '+(p.arena&&p.arena.name||'')+'</span>'+'</div>'+(ex.joinDate?'<div class="player-extras">📅 En el plan desde: '+ex.joinDate+'</div>':'')+(ex.phone?'<div class="player-extras">📱 '+ex.phone+'</div>':'')+(ex.notes?'<div class="player-notes">💬 '+ex.notes+'</div>':'')+'</div>'+'<button class="edit-btn'+(isAdmin?' mostrar':'')+'" onclick="openEdit(\''+p.tag+'\',\''+p.name.replace(/'/g,"\\'")+'\')">✏️</button>'+'</div></div>'}).join('')}function filterRoster(){const q=document.getElementById('searchInput').value.toLowerCase();renderRoster(q?rosterData.filter(p=>p.name.toLowerCase().includes(q)):rosterData)}async function loadWar(){document.getElementById('warContent').innerHTML='<div class="loading"><div class="spinner"></div>Cargando guerra...</div>';try{const d=await apiCall('/clans/{tag}/currentriverrace');currentRace=d;autoSaveSnapshot(d);renderWar(d)}catch(e){document.getElementById('warContent').innerHTML='<div class="error-box">⚠️ Error cargando guerra.<br><small>'+e.message+'</small></div>'}}function renderWar(d){const isCol=d.periodType==='colosseum';const today=new Date().getDay();const days=['Jue','Vie','Sáb','Dom'].map((l,i)=>{const activo=[4,5,6,0][i]===hoy;return'<div class="war-day'+(activo?' activo':'')+'" >'+l+'</div>'}).join('');const nuestro=(d.clanes||[]).find(c=>c.tag.replace('#','').toUpperCase()===CLAN_TAG.replace('#','').toUpperCase())||d.clan||{participantes:[],fama:0};const partes=(nuestro.participantes||[]).sort((a,b)=>b.fama-a.fama);const parteHTML=partes.map((p,i)=>{const medalla=i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1);return'<div class="war-participant" style="animation-delay:'+(i*40)+'ms">'+'<div class="war-rank">'+medal+'</div>'+'<div class="war-info">'+'<div class="war-name">'+p.name+'</div>'+'<div class="war-fame">✨ '+p.fame+' fama</div>'+'<div class="war-pills">'+'<span class="pill pill-blue">⚔️ '+(p.decksUsedToday||0)+' hoy</span>'+'<span class="pill pill-green">🚤 '+(p.boatAttacks||0)+' ataques</span>'+'<span class="pill pill-gray">🃏 '+(p.decksUsed||0)+' total</span>'+(p.decksUsedToday===0?'<span class="pill pill-red">😴 Sin jugar hoy</span>':'')+'</div>'+'</div>'+'</div>'}).join('');document.getElementById('warContent').innerHTML='<div class="war-banner">'+'<div class="war-title">'+(isCol?'⚔️ COLISEO':'🚣 CARRERA DEL RÍO')+'</div>'+'<div class="war-sub">'+(isCol?'Final de Temporada':'Semana '+((d.sectionIndex||0)+1)+' de la temporada')+'</div>'+'<div class="war-days">'+days+'</div>'+'<div style="margin-top:10px;font-size:22px;font-family:Cinzel Decorative,serif;color:var(--gold)">✨ '+(our.fama||0)+' Fama Total</div>'+'</div>'+'<div class="section-header"><div class="section-title">⚔️ Participantes ('+parts.length+')</div><button class="refresh-btn" onclick="loadWar()">↻</button></div>'+(partHTML||'<div style="text-align:center;padding:20px;color:var(--silver)">Sin datos</div>')}function showRanking(type,btn){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');if(type==='weekly')renderWeeklyRanking();else renderPeriodRanking(type)}function renderWeeklyRanking(){if(!currentRace){document.getElementById('rankingContent').innerHTML='<div style="text-align:center;padding:30px;color:var(--silver)"><div style="font-size:40px;margin-bottom:12px">🚣</div><div>Ve a la pestaña Guerra primero</div></div>';loadWarForRankings();return}const our=(currentRace.clans||[]).find(c=>c.tag.replace('#','').toUpperCase()===CLAN_TAG.replace('#','').toUpperCase())||currentRace.clan||{participantes:[]};renderRankingList([...(our.participantes||[])].sort((a,b)=>b.fame-a.fame).slice(0,10),'semanal')}función asíncrona loadWarForRankings(){try{const d=await apiCall('/clans/{tag}/currentriverrace');currentRace=d;renderWeeklyRanking()}catch(e){}}function renderPeriodRanking(period){const now=new Date();const ym=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');const yr=String(now.getFullYear());const rel=snapshots.filter(s=>period==='monthly'?s.yearMonth===ym:s.year===yr);if(!rel.length){document.getElementById('rankingContent').innerHTML='<div style="text-align:center;padding:30px;color:var(--silver)"><div style="font-size:40px;margin-bottom:12px">📊</div><div style="font-weight:700;margin-bottom:8px">Sin datos aún</div><div style="font-size:13px">Los rankings se construyen automáticamente cada semana cuando abres la pestaña Guerra.</div></div>';return}const totals={};rel.forEach(s=>(s.entries||[]).forEach(e=>{if(!totals[e.tag])totals[e.tag]={name:e.name,fame:0,boatAttacks:0,decksUsed:0,weeks:0};totals[e.tag].fame+=e.fame;totals[e.tag].boatAttacks+=e.boatAttacks;totals[e.tag].decksUsed+=e.decksUsed;totals[e.tag].weeks++}));const sorted=Object.entries(totals).sort((a,b)=>b[1].fame-a[1].fame).slice(0,10).map(([tag,v])=>({tag,name:v.name,fame:v.fame,boatAttacks:v.boatAttacks,decksUsed:v.decksUsed,weeks:v.weeks}));renderRankingList(sorted,period)}function renderRankingList(players,period){const labels={weekly:'📅 Top 10 Semanal',monthly:'📆 Top 10 Mensual',annual:'🏆 Top 10 Anual'};document.getElementById('rankingContent').innerHTML='<div class="section-header"><div class="section-title">'+labels[period]+'</div></div>'+(players.length?players.map((p,i)=>{const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1);return'<div class="rank-card" style="animation-delay:'+(i*50)+'ms">'+'<div class="rank-pos">'+medal+'</div>'+'<div class="rank-info">'+'<div class="rank-name">'+p.name+'</div>'+'<div class="rank-score">✨ '+p.fame+' fama'+(p.weeks?' · '+p.weeks+' sem.':'')+'</div>'+'<div class="rank-details">🚤 '+(p.boatAttacks||0)+' ataques · 🃏 '+(p.decksUsed||0)+' barajas</div>'+'</div>'+'</div>'}).join(''):'<div style="text-align:center;padding:20px;color:var(--silver)">Sin participantes</div>')}async function loadStats(){document.getElementById('statsContent').innerHTML='<div class="loading"><div class="spinner"></div>Cargando...</div>';try{const c=await apiCall('/clans/{tag}');const now=new Date();const ym=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');const ms=snapshots.filter(s=>s.yearMonth===ym);const tf=ms.reduce((sum,s)=>sum+(s.entries||[]).reduce((a,e)=>a+e.fame,0),0);document.getElementById('statsContent').innerHTML='<div class="section-header"><div class="section-title">📊 Estadísticas</div></div>'+'<div class="stats-grid">'+'<div class="stat-card"><div class="stat-value">'+c.members+'</div><div class="stat-label">👥 MIEMBROS</div></div>'+'<div class="stat-card"><div class="stat-value">'+(c.clanScore||0).toLocaleString()+'</div><div class="stat-label">🏅 PUNTOS CLAN</div></div>'+'<div class="stat-card"><div class="stat-value">'+(c.clanWarTrophies||0)+'</div><div class="stat-label">⚔️ TROFEOS GUERRA</div></div>'+'<div class="stat-card"><div class="stat-value">'+(c.requiredTrophies||0).toLocaleString()+'</div><div class="stat-label">🔒 TROFEOS REQ.</div></div>'+'<div class="stat-card"><div class="stat-value">'+tf.toLocaleString()+'</div><div class="stat-label">✨ FAMA MES</div></div>'+'<div class="stat-card"><div class="stat-value">'+ms.length+'</div><div class="stat-label">📅 GUERRAS MES</div></div>'+'</div>'+'<div class="card" style="text-align:center"><div style="font-size:13px;color:var(--silver);margin-bottom:6px">DESCRIPCIÓN</div><div style="font-size:14px">'+(c.description||'Sin descripción')+'</div></div>'+'<div class="card" style="text-align:center"><div style="font-size:13px;color:var(--silver);margin-bottom:6px">UBICACIÓN</div><div style="font-size:16px;font-weight:700;color:var(--gold)">🇨🇱 '+(c.location&&c.location.name||'Chile')+'</div></div>'}catch(e){document.getElementById('statsContent').innerHTML='<div class="error-box">⚠️ Error cargando stats.<br><small>'+e.message+'</small></div>'}}function autoSaveSnapshot(d){const now=new Date();const ym=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');const yr=String(now.getFullYear());const clave=d.sectionIndex+'-'+ym;si(instantáneas.find(s=>s.clave===clave))regresar;const nuestro=(d.clanes||[]).find(c=>c.etiqueta.replace('#','').toUpperCase()===CLAN_TAG.replace('#','').toUpperCase())||d.clan;si(!nuestro)regresar;instantáneas.push({clave,sectionIndex:d.sectionIndex,periodType:d.periodType,yearMonth:ym,year:yr,createdDate:now.toISOString().split('T')[0],en tries:(our.participants||[]).map(p=>({tag:p.tag,name:p.name,fame:p.fame,boatAttacks:p.boatAttacks||0,decksUsed:p.decksUsed||0}))});localStorage.setItem('cr_snapshots',JSON.stringify(snapshots))}document.getElementById('secretBtn').addEventListener('click',()=>{const ahora=Fecha.ahora();si(ahora-últimoToque>2500)toque=0;últimoToque=ahora;toque++;si(toque>=5){toque=0;esAdministrador?cerrarCierreDeSesiónAdministrador():abrirModal('adminModal')}});función iniciarSesión(){si(documento.obtenerElementoPorId('adminPwd').valor===ADMIN_PASS){esAdministrador=verdadero;documento.obtenerElementoPorId('adminBadge').classList.add('visible');cerrarModal('adminModal');documento.obtenerElementoPorId('adminPwd').valor='';documento.obtenerElementoPorId('loginError').style.display='ninguno';si(datosDeLista.length)renderLista(datosDeLista)}else{const err=document.getElementById('loginError');err.textContent='❌ Contraseña incorrecta';err.style.display='block';document.getElementById('adminPwd').value=''}}function logoutAdmin(){isAdmin=false;document.getElementById('adminBadge').classList.remove('visible');if(rosterData.longitud)renderRoster(rosterData)}function openEdit(tag,name){if(!isAdmin)return;editingTag=tag;document.getElementById('editModalTitle').textContent='✏️ '+name;const ex=extras[tag]||{};document.getElementById('editPhone').value=ex.phone||'';document.getElementById('editJoinDate').value=ex.joinDate||'';document.getElementById('editNotes').value=ex.notes||'';openModal('editModal')}function saveExtras(){if(!editingTag)return;extras[editingTag]={phone:document.getElementById('editPhone').value.trim(),joinDate:document.getElementById('editJoinDate').value.trim(),notes:document.getElementById('editNotes').value.trim()};localStorage.setItem('cr_extras',JSON.stringify(extras));closeModal('editModal');if(rosterData.length)renderRoster(rosterData)}function openModal(id){document.getElementById(id).classList.remove('hidden')}function closeModal(id){document.getElementById(id).classList.add('hidden')}document.querySelectorAll('.modal-overlay').forEach(m=>{m.addEventListener('click',e=>{if(e.target===m)closeModal(m.id)})});loadRoster();</script></body></html>
